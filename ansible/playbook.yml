- name: Setup my workplace
  hosts: controlnodes
  vars: 
    repository_path: "{{ playbook_dir | ansible.builtin.dirname }}"
    dockerfile_path: "{{ playbook_dir | ansible.builtin.dirname }}/docker"



  pre_tasks:
    - name: Set ansible_become_exe
      ansible.builtin.set_fact:
        ansible_become_exe: "{{'sudo.ws' if ( ansible_facts['lsb']['id'] == 'Ubuntu' )  and  ( ansible_facts['lsb']['major_release'] | int >= 26 ) else 'sudo'  }}"
         

    - name: Get user
      ansible.builtin.shell: whoami
      register: user
    - name: Get user id
      ansible.builtin.shell: id -u
      register: user_id
    - name: Get group id
      ansible.builtin.shell: id -g
      register: group_id
    - name: Get Ubuntu version
      ansible.builtin.shell: . /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}"
      register: ubuntu_version
    - name: Get Architecture
      ansible.builtin.shell: dpkg --print-architecture
      register: machine_architecture


  roles: 
    - role: common
    - role: docker-install
    - role: terminal
    - role: devcontainer
