- name: Install docker ce
  ansible.builtin.apt:
    name: docker-ce
  become: true
  vars:
    ansible_become_exe: sudo.ws
  
- name: Install docker ce-cli
  ansible.builtin.apt:
    name: docker-ce-cli
  become: true
  vars:
    ansible_become_exe: sudo.ws

- name: Install containerd.io
  ansible.builtin.apt:
    name: containerd.io
  become: true
  vars:
    ansible_become_exe: sudo.ws

- name: Install docker-buildx-plugin
  ansible.builtin.apt:
    name: docker-buildx-plugin
  become: true
  vars:
    ansible_become_exe: sudo.ws

- name: Install docker-compose-plugin
  ansible.builtin.apt:
    name: docker-compose-plugin
  become: true
  vars:
    ansible_become_exe: sudo.ws

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ user.stdout }}"
    uid: "{{user_id.stdout }}"
    group: docker
  become: true
  vars:
    ansible_become_exe: sudo.ws
