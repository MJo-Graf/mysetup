- name: Create docker contaner
  community.docker.docker_container:
    name: devcontainer
    image: devcontainer:1.0.0
    env: 
      DISPLAY: "{{ lookup('ansible.builtin.env','DISPLAY') }}"
    volumes:
      - "/tmp/.X11-unix:/tmp/.X11-unix"
      - "/home/{{ user.stdout }}/workspace:/home/{{ user.stdout }}/workspace"
    tty: true
    interactive: true
    networks:
      - name: host
